# Configuração do nginx que serve o front e faz proxy da API.
# Em produção ele cumpre o papel que o proxy.conf.json cumpre em dev:
# o navegador só fala com o front, e /api/* é repassado ao container da API
# (mesma origem, então não precisa de CORS).

server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # /api/* -> container "api" (nome do serviço no docker-compose) na porta 8080
  location /api/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # SPA: rota desconhecida devolve o index.html e o Angular Router resolve
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Assets com hash no nome podem ser cacheados agressivamente
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
